<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  @keyframes bf-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes bf-breathe { 0%,100%{opacity:.5} 50%{opacity:.95} }
</style>
</helmet>
<div style="min-height:100vh; width:100%; background:#e7e5df; box-sizing:border-box; padding:40px; font-family:'Hanken Grotesk', sans-serif; display:flex; flex-direction:column; align-items:center;">

  <div style="width:100%; max-width:1040px; margin-bottom:18px;">
    <div style="font-family:'Newsreader', serif; font-size:30px; color:#2b2b2b; line-height:1;">brainfood — blank canvas</div>
    <div style="font-family:'Hanken Grotesk', sans-serif; font-size:15px; color:#6b675f; margin-top:8px; line-height:1.5;">Quiet, open, everything-is-possible. Just the cursor and an open question.</div>
  </div>

  <!-- THE SCREEN -->
  <div style="position:relative; width:100%; max-width:1040px; height:660px; background:#fdfdfb; border:2.5px solid #2b2b2b; border-radius:16px; box-shadow:0 2px 6px rgba(0,0,0,.08); overflow:hidden; display:flex; flex-direction:column;">

    <!-- top nav -->
    <div style="display:flex; align-items:center; justify-content:space-between; padding:18px 28px 0;">
      <div style="font-family:'Newsreader', serif; font-style:italic; font-size:19px; color:#9a958c; cursor:pointer;">brainfood</div>
      <div style="display:flex; align-items:center; gap:18px;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#a8a39a" stroke-width="1.6"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#a8a39a" stroke-width="1.6" stroke-linecap="round"/></svg>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" style="cursor:pointer;"><circle cx="12" cy="8" r="4" stroke="#a8a39a" stroke-width="1.6"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#a8a39a" stroke-width="1.6" stroke-linecap="round"/></svg>
        <div style="font-weight:600; font-size:13px; color:#2b2b2b; cursor:pointer; display:flex; align-items:center; gap:5px;"><span style="font-size:16px; font-weight:300;">+</span> New</div>
      </div>
    </div>
    <div style="padding:6px 28px 0;">
      <span style="font-size:12px; color:#bdb9b0;">Thu · 19 Jun</span>
    </div>

    <!-- the open canvas -->
    <div style="flex:1; display:flex; flex-direction:column; justify-content:flex-start; padding:44px 56px 0;">
      <!-- optional, faint title — for those who already know their subject -->
      <div style="margin-bottom:30px;">
        <span style="font-family:'Newsreader', serif; font-size:22px; color:#d6d2c9;">Title (optional)</span>
      </div>
      <div style="display:block;">
        <span style="font-family:'Newsreader', serif; font-style:italic; font-size:46px; line-height:1.1; color:#c4c0b7;">What do you want to think about?</span><span style="display:inline-block; width:3px; height:38px; background:#c2502a; margin-left:6px; vertical-align:-4px; animation:bf-blink 1.1s step-end infinite;"></span>
      </div>
    </div>

    <!-- save, bottom-right -->
    <div style="position:absolute; bottom:26px; right:30px; display:flex; align-items:center; gap:7px; font-family:'Hanken Grotesk', sans-serif; font-weight:600; font-size:14px; color:#2b2b2b; border:1.5px solid #d8d4cb; border-radius:22px; padding:9px 20px; cursor:pointer; background:#fdfdfb; transition:background .2s ease, color .2s ease, border-color .2s ease;" style-hover="background:#2b2b2b; color:#faf8f4; border-color:#2b2b2b;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12.5 L10 17.5 L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Save
    </div>

  </div>
  <div style="width:100%; max-width:1040px; margin-top:18px;">
    <div style="display:flex; gap:9px; align-items:flex-start; max-width:520px;">
      <span style="font-family:'Hanken Grotesk',sans-serif; font-size:18px; color:#c2502a;">↑</span>
      <span style="font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#c2502a; line-height:1.4;">All the air in the room. No toolbar, no folders, no demands — just the cursor and an open question.</span>
    </div>
  </div>

</div>
</x-dc>
</body>
</html>
