<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  @keyframes bf-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  a { text-decoration:none; color:inherit; }
</style>
</helmet>
<div style="width:100%; min-height:100vh; background:#faf8f4; font-family:'Hanken Grotesk', sans-serif; color:#2b2b2b; display:flex; flex-direction:column; overflow-x:hidden;">

  <!-- ===== HEADER ===== -->
  <div style="flex:none; max-width:1140px; width:100%; margin:0 auto; padding:26px 48px; display:flex; align-items:center; justify-content:space-between;">
    <div style="font-family:'Newsreader', serif; font-style:italic; font-size:24px; color:#2b2b2b;">brainfood</div>
    <div style="display:flex; align-items:center; gap:26px;">
      <a href="#" style="font-size:14.5px; color:#6b675f; white-space:nowrap;" style-hover="color:#2b2b2b;">Sign in</a>
      <a href="#" style="font-size:14.5px; font-weight:600; color:#faf8f4; background:#2b2b2b; padding:9px 18px; border-radius:22px; white-space:nowrap;" style-hover="background:#c2502a;">Start writing</a>
    </div>
  </div>

  <!-- ===== HERO = creating a note ===== -->
  <div style="flex:1; max-width:1140px; width:100%; margin:0 auto; padding:0 48px; display:flex; flex-direction:column; justify-content:center;">
    <div style="width:100%; max-width:880px; padding-bottom:8vh;">
      <div style="display:block;">
        <span style="font-family:'Newsreader', serif; font-style:italic; font-size:46px; line-height:1.1; color:#c4c0b7;">What do you want to think about?</span><span style="display:inline-block; width:3px; height:38px; background:#c2502a; margin-left:6px; vertical-align:-4px; animation:bf-blink 1.1s step-end infinite;"></span>
      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() { return {}; }
}
</script>
</body>
</html>
