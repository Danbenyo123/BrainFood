<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  input { outline: none; }
  input:focus { border-color: #2b2b2b !important; }
  a { text-decoration: none; color: inherit; }
</style>
</helmet>
<div style="width:100%; min-height:100vh; background:#faf8f4; font-family:'Hanken Grotesk', sans-serif; color:#2b2b2b; display:flex; flex-direction:column;">

  <!-- header -->
  <div style="flex:none; padding:28px 48px;">
    <a href="#" style="font-family:'Newsreader', serif; font-style:italic; font-size:22px; color:#2b2b2b;">brainfood</a>
  </div>

  <!-- centered form -->
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px 80px;">
    <div style="width:100%; max-width:400px; display:flex; flex-direction:column;">

      <!-- heading -->
      <div style="font-family:'Newsreader', serif; font-size:42px; line-height:1.05; color:#2b2b2b; margin-bottom:10px;">Welcome back.</div>
      <div style="font-size:15px; color:#857f76; margin-bottom:40px; line-height:1.5;">Pick up where you left off.</div>

      <!-- email -->
      <div style="display:flex; flex-direction:column; gap:7px; margin-bottom:18px;">
        <label style="font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#a8a39a; font-weight:600;">Email</label>
        <input type="email" placeholder="you@example.com" style="width:100%; padding:12px 16px; border:1.5px solid #d8d4cb; border-radius:10px; font-family:'Hanken Grotesk', sans-serif; font-size:15px; color:#2b2b2b; background:#fdfdfb; transition:border-color .15s ease;">
      </div>

      <!-- password -->
      <div style="display:flex; flex-direction:column; gap:7px; margin-bottom:10px;">
        <label style="font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#a8a39a; font-weight:600;">Password</label>
        <div style="position:relative;">
          <input type="{{ inputType }}" placeholder="········" style="width:100%; padding:12px 48px 12px 16px; border:1.5px solid #d8d4cb; border-radius:10px; font-family:'Hanken Grotesk', sans-serif; font-size:15px; color:#2b2b2b; background:#fdfdfb; transition:border-color .15s ease;">
          <div onClick="{{ togglePw }}" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#c4c0b7;" style-hover="color:#6b675f;">
            <sc-if value="{{ pwVisible }}" hint-placeholder-val="{{ false }}">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </sc-if>
            <sc-if value="{{ pwHidden }}" hint-placeholder-val="{{ true }}">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
            </sc-if>
          </div>
        </div>
      </div>

      <!-- forgot -->
      <div style="display:flex; justify-content:flex-end; margin-bottom:32px;">
        <a href="#" style="font-size:13px; color:#a8a39a;" style-hover="color:#2b2b2b;">Forgot password?</a>
      </div>

      <!-- CTA -->
      <div style="width:100%; padding:13px; background:#2b2b2b; color:#faf8f4; border-radius:22px; font-weight:600; font-size:15px; text-align:center; cursor:pointer; transition:background .2s ease;" style-hover="background:#c2502a;">
        Sign in
      </div>

      <!-- divider -->
      <div style="display:flex; align-items:center; gap:14px; margin:28px 0;">
        <div style="flex:1; height:1px; background:#ece8df;"></div>
        <span style="font-size:12px; color:#c4c0b7;">or</span>
        <div style="flex:1; height:1px; background:#ece8df;"></div>
      </div>

      <!-- switch -->
      <div style="text-align:center; font-size:14px; color:#857f76;">
        No account yet? <a href="#" style="color:#2b2b2b; font-weight:600;" style-hover="color:#c2502a;">Start writing →</a>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { pwVisible: false };
  renderVals() {
    const v = this.state.pwVisible;
    return {
      togglePw: () => this.setState(s => ({ pwVisible: !s.pwVisible })),
      inputType: v ? 'text' : 'password',
      pwVisible: v,
      pwHidden: !v,
    };
  }
}
</script>
</body>
</html>
